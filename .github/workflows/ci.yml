name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: src/python/requirements.txt
      - run: pip install -r src/python/requirements.txt
      - run: ruff check src/python
      - run: python -m compileall src/python
      - run: pytest -q

  dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"
      - run: dotnet restore src/dotnet/AiForDevs.Api/AiForDevs.Api.csproj
      - run: dotnet build src/dotnet/AiForDevs.Api/AiForDevs.Api.csproj --configuration Release --no-restore
